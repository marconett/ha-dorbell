# 433 MHz doorbell receiver
# Waveshare ESP32-C6-Zero + RX480E-4
# 3V3->VCC, GND->GND, D2 -> GPIO1 direct.
# The RX480E-4 decodes in hardware, pair it to the doorbell with its
# on-board learn button, no code learning in software.

esphome:
  name: doorbell-receiver
  friendly_name: Doorbell Receiver

esp32:
  board: esp32-c6-devkitc-1
  framework:
    type: esp-idf

logger:
  hardware_uart: USB_SERIAL_JTAG

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

binary_sensor:
  - platform: gpio
    name: "Doorbell"
    device_class: occupancy
    pin:
      number: GPIO1
      mode:
        input: true
        pulldown: true
    filters:
      - delayed_off: 250ms # sender repeats while held; bridge the micro-gaps between code words but release fast so the "dong" follows promptly
